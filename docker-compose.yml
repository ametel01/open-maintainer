services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: open_maintainer
      POSTGRES_PASSWORD: open_maintainer
      POSTGRES_DB: open_maintainer
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U open_maintainer -d open_maintainer"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  deps:
    image: oven/bun:1
    working_dir: /app
    command: bun install --frozen-lockfile
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  api:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    command: bun run dev:api
    env_file: .env
    environment:
      API_PORT: 4000
      DATABASE_URL: postgres://open_maintainer:open_maintainer@postgres:5432/open_maintainer
      REDIS_URL: redis://redis:6379
      GH_TOKEN: ${GH_TOKEN:-}
      OPEN_MAINTAINER_GIT_AUTHOR_NAME: ${OPEN_MAINTAINER_GIT_AUTHOR_NAME:-Open Maintainer}
      OPEN_MAINTAINER_GIT_AUTHOR_EMAIL: ${OPEN_MAINTAINER_GIT_AUTHOR_EMAIL:-open-maintainer@users.noreply.github.com}
      OPEN_MAINTAINER_CODEX_MODEL: ${OPEN_MAINTAINER_CODEX_MODEL:-}
      OPEN_MAINTAINER_CLAUDE_MODEL: ${OPEN_MAINTAINER_CLAUDE_MODEL:-}
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ${HOME}/.codex:/root/.codex
      - ${HOME}/.claude:/root/.claude
      - ${HOME}/.config:/root/.config
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4000/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      deps:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    working_dir: /app
    command: bun run dev:worker
    env_file: .env
    environment:
      API_BASE_URL: http://api:4000
      DATABASE_URL: postgres://open_maintainer:open_maintainer@postgres:5432/open_maintainer
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_healthy

  web:
    image: oven/bun:1
    working_dir: /app
    command: sh -c "rm -rf apps/web/.next && bun run dev:web"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      API_BASE_URL: http://api:4000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  node_modules:
